name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trophy SVG
        run: |
          mkdir -p assets
          curl -sSL "https://github-trophies.vercel.app/?username=DishenMakwana&theme=tokyonight&no-frame=true&column=-1&margin-w=8&margin-h=8" -o assets/trophies.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trophies.svg
          git diff --cached --quiet || git commit -m "chore: update trophies SVG"
          git push
